name: "Provisioning / Reconciliation Diagnostic"
team: "IAM_IGA"
objective: "Entender por que o acesso nao refletiu corretamente, usando Vision e documentacao para localizar a falha."
preconditions:
  - "Usuario ou role afetada e alvo esperado."
integrations: ["vision", "jira", "confluence"]
agents:
  - "IAM Orchestrator"
  - "Vision Agent"
  - "IAM Knowledge Agent"
  - "Jira/Confluence IAM Agent"
steps:
  - "Confirmar estado esperado e real do acesso no Vision."
  - "Consultar status de atribuicoes, reconciliacao e aprovacoes pendentes."
  - "Usar documentacao para localizar o ponto correto do fluxo de provisionamento."
  - "Verificar no Jira se ha ticket relacionado ou CAB que justifique o estado atual."
  - "Consolidar onde a cadeia falhou e quais os proximos passos."
success_criteria:
  - "Ponto mais provavel da falha identificado."
  - "Proximos passos manuais ou de follow-up definidos."
output_format: "ponto de falha, evidencias, classificacao, proximos passos"
failure_handling:
  - "Se o Vision nao estiver disponivel, registrar a lacuna e indicar verificacao manual."
setup_points:
  - "Pedir Vision antes de investigar reconciliacao."
  - "Consultar Jira/Confluence para contexto do processo."
match_keywords:
  - "nao provisionou"
  - "nao refletiu"
  - "reconciliacao"
  - "provisioning"
  - "diagnostic"
